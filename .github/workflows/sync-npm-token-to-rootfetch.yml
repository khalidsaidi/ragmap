name: sync-npm-token-to-rootfetch

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "owner/repo to receive NPM_TOKEN"
        required: true
        default: "khalidsaidi/rootfetch"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync NPM_TOKEN to target repo
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ] || [ -z "${NPM_TOKEN:-}" ]; then
            echo "required secret missing" >&2
            exit 1
          fi
          gh secret set NPM_TOKEN -R "$TARGET_REPO" --body "$NPM_TOKEN"
          echo "NPM_TOKEN synced to $TARGET_REPO"
